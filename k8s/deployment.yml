apiVersion: apps/v1
kind: Deployment
metadata:
  name: videostream
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: videostream
  template:
    metadata:
      labels:
        app: videostream
    spec:
      containers:
      - name: videostream
        image: 192.168.100.11:5000/videostream:latest
        ports:
        - containerPort: 3000
        envFrom:
        - secretRef:
            name: videostream-secret
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
